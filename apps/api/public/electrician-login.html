<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#1E40AF">
<title>Electrician Login — Kodspot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/design-system.css?v=10">
<style>
.auth-card{max-width:390px}
.auth-subtitle{color:#1E40AF}
.pin-note{font-size:.73rem;color:var(--text-muted);margin-top:.25rem}
</style>
</head>
<body class="auth-layout">
<div class="auth-card">
  <h1 class="auth-title" id="brandTitle">Kodspot</h1>
  <p class="auth-subtitle" id="brandSub">Electrician Login</p>
  <div id="error" class="error-msg"></div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label" for="employeeId">Employee ID</label>
      <input class="form-input" type="text" id="employeeId" required maxlength="50" placeholder="e.g. EMP-001" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label" for="pin">6-digit PIN</label>
      <input class="form-input" type="password" id="pin" required minlength="6" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" placeholder="Enter 6-digit PIN" autocomplete="current-password">
      <div class="pin-note">Use the PIN created by your Admin.</div>
    </div>
    <button type="submit" class="btn btn-primary btn-block" id="btn">Sign In</button>
  </form>

  <p style="margin-top:var(--sp-lg);font-size:.8rem;color:var(--text-light);text-align:center">
    <a href="/" style="color:var(--primary)">&larr; Back to Home</a>
  </p>
</div>

<script src="/js/offline-sync.js?v=1"></script>
<script src="/js/app.js?v=14"></script>
<script>
var $ = App.$;
var orgSlug = App.getOrgSlug();
var mod = App.getModule();

App.initModulePWA();

function showErr(msg) { $('error').textContent = msg; $('error').style.display = 'block'; }
function hideErr() { $('error').style.display = 'none'; }

if (orgSlug) {
  fetch('/api/org/' + encodeURIComponent(orgSlug)).then(function(r) { return r.ok ? r.json() : null; }).then(function(org) {
    if (org && org.name) {
      $('brandTitle').textContent = org.name;
      $('brandSub').innerHTML = 'Electrician Login <span style="display:block;margin-top:.3rem;font-size:.72rem;color:var(--text-light)">Powered by Kodspot</span>';
      document.title = 'Electrician Login — ' + org.name;
      localStorage.setItem('orgName', org.name);
    }
  }).catch(function() {});
}

$('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault(); hideErr();
  var pin = $('pin').value.trim();
  if (!/^\d{6}$/.test(pin)) { showErr('PIN must be exactly 6 digits'); return; }

  var btn = $('btn'); btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    var res = await fetch('/api/auth/worker-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        orgSlug: orgSlug || localStorage.getItem('orgSlug') || '',
        employeeId: $('employeeId').value.trim(),
        pin: pin
      })
    });
    var data = await res.json();
    if (!res.ok) { showErr(data.error || 'Login failed'); return; }

    localStorage.setItem('elec_token', data.token);
    localStorage.setItem('elec_user', JSON.stringify(data.worker || {}));
    if (orgSlug) localStorage.setItem('orgSlug', orgSlug);
    if (data.org && data.org.name) localStorage.setItem('orgName', data.org.name);
    localStorage.setItem('activeModule', mod);

    location.href = App.orgPath('electrician-tickets');
  } catch (err) {
    showErr('Network error. Please try again.');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});

if (localStorage.getItem('elec_token')) location.href = App.orgPath('electrician-tickets');
</script>
<footer style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:.8rem;font-size:.75rem;color:var(--text-muted)">
  <a href="/privacy" style="color:var(--text-muted);text-decoration:underline">Privacy Policy</a> · <a href="/terms" style="color:var(--text-muted);text-decoration:underline">Terms of Service</a>
</footer>
</body>
</html>
