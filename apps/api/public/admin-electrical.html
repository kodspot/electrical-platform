<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#d97706">
<title>Electrical Inspections — Kodspot</title>
<link rel="stylesheet" href="/css/design-system.css?v=9">
<style>
.page-title{display:flex;align-items:center;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.page-title h1{font-size:1.25rem;font-weight:700;margin:0}
.page-title .badge{font-size:.7rem}

/* Stats row */
.ei-stats{display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
.ei-stat{flex:1;min-width:110px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.85rem .75rem;text-align:center}
.ei-stat-val{font-size:1.4rem;font-weight:700;line-height:1.1}
.ei-stat-label{font-size:.68rem;color:var(--text-muted);margin-top:.15rem}
.ei-stat.stat-faults .ei-stat-val{color:var(--danger)}
.ei-stat.stat-late .ei-stat-val{color:var(--warning-text)}
.ei-stat.stat-flagged .ei-stat-val{color:var(--danger)}

/* Filters */
.ei-filters{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.75rem;margin-bottom:.75rem}
.ei-filter-row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;width:100%}
.ei-filter-row+.ei-filter-row{margin-top:.5rem}
.ei-search{flex:2;min-width:140px}
.ei-filter-sel{flex:1;min-width:110px}
.ei-date-input{flex:0 0 130px;min-width:110px}

/* Summary */
.ei-summary{display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;margin-bottom:.5rem;font-size:.75rem;color:var(--text-muted)}

/* Table */
.ei-tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.ei-tbl th{text-align:left;padding:.5rem .4rem;font-size:.7rem;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap}
.ei-tbl td{padding:.55rem .4rem;border-bottom:1px solid var(--border-light,var(--border));vertical-align:middle}
.ei-tbl tr:hover{background:var(--hover-bg,rgba(14,165,164,.03))}
.ei-location{font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ei-date{font-size:.72rem;color:var(--text-muted);white-space:nowrap}
.ei-faults{font-weight:700;color:var(--danger)}
.ei-no-faults{color:var(--success);font-weight:600}
.empty{text-align:center;padding:2rem;color:var(--text-muted)}

/* Pager */
.ei-pager{display:flex;justify-content:center;gap:.3rem;margin-top:.75rem;flex-wrap:wrap}
.ei-pager button{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.3rem .6rem;font-size:.75rem;cursor:pointer;color:var(--text)}
.ei-pager button:hover{border-color:var(--primary)}
.ei-pager button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.ei-pager button:disabled{opacity:.4;cursor:default}

/* Detail modal */
.ei-detail-row{display:flex;gap:.5rem;margin-bottom:.5rem;font-size:.82rem}
.ei-detail-label{font-weight:600;min-width:100px;color:var(--text-muted)}
.ei-detail-val{flex:1}
.ei-check-list{list-style:none;padding:0;margin:.25rem 0}
.ei-check-list li{display:flex;align-items:center;gap:.4rem;padding:.3rem 0;font-size:.8rem;border-bottom:1px solid var(--border-light,var(--border))}
.ei-check-list li:last-child{border:none}
.ei-check-status{font-weight:700;font-size:.72rem;padding:.1rem .35rem;border-radius:3px}
.ei-check-ok{background:rgba(16,185,129,.1);color:var(--success)}
.ei-check-faulty{background:rgba(239,68,68,.1);color:var(--danger)}
.ei-check-na{background:rgba(120,120,120,.08);color:var(--text-muted)}
.ei-check-remarks{font-size:.72rem;color:var(--text-muted);font-style:italic;margin-left:.25rem}

.lightbox-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;align-items:center;justify-content:center}
.lightbox-overlay.active{display:flex}
.lightbox-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.5rem;width:36px;height:36px;border-radius:50%;cursor:pointer}
.lightbox-img{max-width:90vw;max-height:90vh;border-radius:var(--radius)}

@media(max-width:768px){
  .ei-tbl td,.ei-tbl th{padding:.45rem .3rem;font-size:.75rem}
  .ei-stats{gap:.5rem}
  .ei-stat{padding:.6rem .5rem}
  .ei-stat-val{font-size:1.1rem}
  .hide-mobile{display:none}
}
</style>
</head>
<body>
<nav class="topbar">
  <div class="topbar-left">
    <a class="topbar-brand" href="/">Kodspot</a>
    <div id="topbar-nav"></div>
  </div>
  <div class="topbar-right">
    <span class="topbar-user" id="userName"></span>
    <button class="btn btn-sm btn-ghost" id="logoutBtn">Logout</button>
  </div>
</nav>

<main class="main-content">
  <div class="page-title">
    <h1>⚡ Electrical Inspections</h1>
  </div>

  <!-- Stats -->
  <div class="ei-stats">
    <div class="ei-stat"><div class="ei-stat-val" id="statTotal">0</div><div class="ei-stat-label">Total</div></div>
    <div class="ei-stat stat-faults"><div class="ei-stat-val" id="statFaults">0</div><div class="ei-stat-label">With Faults</div></div>
    <div class="ei-stat stat-late"><div class="ei-stat-val" id="statLate">0</div><div class="ei-stat-label">Late</div></div>
    <div class="ei-stat stat-flagged"><div class="ei-stat-val" id="statFlagged">0</div><div class="ei-stat-label">Flagged</div></div>
  </div>

  <!-- Filters -->
  <div class="ei-filters">
    <div class="ei-filter-row">
      <input class="form-input ei-search" id="eiSearch" placeholder="Search by location…" oninput="debounceSearch()">
      <select class="form-select ei-filter-sel" id="filterShift" onchange="loadRecords(1)">
        <option value="">All Shifts</option>
        <option value="MORNING">Morning</option><option value="AFTERNOON">Afternoon</option>
        <option value="NIGHT">Night</option><option value="GENERAL">General</option>
      </select>
      <select class="form-select ei-filter-sel" id="filterStatus" onchange="loadRecords(1)">
        <option value="">All Status</option>
        <option value="SUBMITTED">Submitted</option><option value="FLAGGED">Flagged</option>
      </select>
      <select class="form-select ei-filter-sel" id="filterFaults" onchange="loadRecords(1)">
        <option value="">All Records</option>
        <option value="true">With Faults</option>
        <option value="false">No Faults</option>
      </select>
    </div>
    <div class="ei-filter-row">
      <select class="form-select ei-filter-sel" id="filterLocation" onchange="loadRecords(1)">
        <option value="">All Locations</option>
      </select>
      <select class="form-select ei-filter-sel" id="filterLate" onchange="loadRecords(1)">
        <option value="">All</option>
        <option value="true">Late Only</option>
        <option value="false">On Time Only</option>
      </select>
      <input class="form-input ei-date-input" id="filterFrom" type="date" title="From" onchange="loadRecords(1)">
      <input class="form-input ei-date-input" id="filterTo" type="date" title="To" onchange="loadRecords(1)">
      <select class="form-select ei-filter-sel" id="filterSort" onchange="loadRecords(1)">
        <option value="newest">Newest</option><option value="oldest">Oldest</option>
        <option value="location">By Location</option><option value="faults">Most Faults</option>
      </select>
      <button class="btn btn-sm btn-ghost" onclick="clearFilters()">Clear</button>
      <button class="btn btn-sm btn-outline" onclick="exportCSV()">CSV</button>
    </div>
  </div>

  <!-- Summary -->
  <div class="ei-summary" id="summaryBar"></div>

  <!-- Table -->
  <div class="section">
    <div class="table-wrap">
      <table class="ei-tbl">
        <thead>
          <tr>
            <th>#</th><th>Location</th><th>Shift</th><th>Faults</th>
            <th class="hide-mobile">Supervisor</th><th class="hide-mobile">Workers</th>
            <th class="hide-mobile">Date</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"><tr><td colspan="9" class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
    <div class="ei-pager" id="pager"></div>
  </div>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:580px">
    <h2 class="modal-title">Inspection Details</h2>
    <div id="detailContent"></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-outline" onclick="App.closeModal('detailModal')">Close</button>
      <button type="button" class="btn btn-danger" id="flagBtn" onclick="">Flag</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="event.stopPropagation();closeLightbox()">×</button>
  <img class="lightbox-img" id="lightboxImg" onclick="event.stopPropagation()">
</div>

<script src="/js/offline-sync.js?v=1"></script>
<script src="/js/app.js?v=11"></script>
<script>
if (!App.initAdmin('electrical')) throw '';
App.initNotifications(App.apiFetch);
var esc = App.esc, $ = App.$;
var currentPage = 1, totalPages = 1, PAGE_SIZE = 25;
var searchTimer = null;

function debounceSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(function() { loadRecords(1); }, 300); }

// ── Load records ──
async function loadRecords(page) {
  currentPage = page || 1;
  var params = ['page=' + currentPage, 'limit=' + PAGE_SIZE];
  var search = $('eiSearch').value.trim(); if (search) params.push('search=' + encodeURIComponent(search));
  var shift = $('filterShift').value; if (shift) params.push('shift=' + shift);
  var status = $('filterStatus').value; if (status) params.push('status=' + status);
  var faults = $('filterFaults').value; if (faults) params.push('hasFaults=' + faults);
  var loc = $('filterLocation').value; if (loc) params.push('locationId=' + loc);
  var late = $('filterLate').value; if (late) params.push('isLate=' + late);
  var from = $('filterFrom').value; if (from) params.push('from=' + from);
  var to = $('filterTo').value; if (to) params.push('to=' + to);
  var sort = $('filterSort').value; if (sort) params.push('sort=' + sort);

  var res = await App.apiFetch('/electrical-inspections?' + params.join('&'));
  if (!res) return;
  var data = await res.json();
  var records = data.records || [];
  totalPages = data.pages || 1;

  // Stats
  var st = data.stats || {};
  $('statTotal').textContent = st.total || 0;
  $('statFaults').textContent = st.faults || 0;
  $('statLate').textContent = st.late || 0;
  $('statFlagged').textContent = st.flagged || 0;

  // Summary
  $('summaryBar').innerHTML = '<span>Total: <b>' + (data.total || 0) + '</b></span> · <span>Page <b>' + currentPage + '</b> of <b>' + totalPages + '</b></span>';

  if (!records.length) {
    $('tableBody').innerHTML = '<tr><td colspan="9" class="empty">No inspections found</td></tr>';
    $('pager').innerHTML = '';
    return;
  }

  $('tableBody').innerHTML = records.map(function(r, i) {
    var num = (currentPage - 1) * PAGE_SIZE + i + 1;
    var lateBadge = r.isLate ? ' <span class="badge badge-warning" style="font-size:.58rem">LATE</span>' : '';
    var statusCls = r.status === 'FLAGGED' ? 'badge-danger' : 'badge-success';
    var faultHtml = r.faultyCount > 0
      ? '<span class="ei-faults">' + r.faultyCount + ' fault' + (r.faultyCount > 1 ? 's' : '') + '</span>'
      : '<span class="ei-no-faults">✓ All OK</span>';
    var workerNames = r.workers ? r.workers.slice(0, 2).map(function(w){ return esc(w.name); }).join(', ') : '—';
    if (r.workers && r.workers.length > 2) workerNames += ' +' + (r.workers.length - 2);
    return '<tr>' +
      '<td>' + num + '</td>' +
      '<td class="ei-location">' + esc(r.location ? r.location.name : '—') + '</td>' +
      '<td><span class="badge badge-muted">' + r.shift + '</span>' + lateBadge + '</td>' +
      '<td>' + faultHtml + '</td>' +
      '<td class="hide-mobile">' + esc(r.supervisor ? r.supervisor.name : '—') + '</td>' +
      '<td class="hide-mobile">' + workerNames + '</td>' +
      '<td class="hide-mobile ei-date">' + App.fmtDateShort(r.inspectedAt) + '</td>' +
      '<td><span class="badge ' + statusCls + '">' + r.status + '</span></td>' +
      '<td><button class="btn btn-sm btn-outline" onclick="viewDetail(\'' + r.id + '\')">View</button></td>' +
    '</tr>';
  }).join('');
  renderPager();
}

function renderPager() {
  if (totalPages <= 1) { $('pager').innerHTML = ''; return; }
  var html = '<button' + (currentPage <= 1 ? ' disabled' : '') + ' onclick="loadRecords(' + (currentPage - 1) + ')">← Prev</button>';
  for (var i = 1; i <= totalPages && i <= 10; i++) {
    html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="loadRecords(' + i + ')">' + i + '</button>';
  }
  html += '<button' + (currentPage >= totalPages ? ' disabled' : '') + ' onclick="loadRecords(' + (currentPage + 1) + ')">Next →</button>';
  $('pager').innerHTML = html;
}

function clearFilters() {
  $('eiSearch').value = '';
  $('filterShift').value = '';
  $('filterStatus').value = '';
  $('filterFaults').value = '';
  $('filterLocation').value = '';
  $('filterLate').value = '';
  $('filterFrom').value = '';
  $('filterTo').value = '';
  $('filterSort').value = 'newest';
  loadRecords(1);
}

// ── Detail ──
async function viewDetail(id) {
  var res = await App.apiFetch('/electrical-inspections/' + id);
  if (!res) return;
  var r = await res.json();
  var CHECK_LABELS = {
    LIGHTING: '💡 Lighting', FAN: '🌀 Fan', AC: '❄️ AC', SWITCH_BOARD: '🔘 Switch Board',
    SOCKET: '🔌 Socket', WIRING: '🪛 Wiring', MCB_PANEL: '⚙️ MCB Panel',
    EARTHING: '🔗 Earthing', EMERGENCY_LIGHT: '🚨 Emergency Light'
  };

  var html = '<div class="ei-detail-row"><span class="ei-detail-label">Location</span><span class="ei-detail-val">' + esc(r.location ? r.location.name : '—') + '</span></div>';
  html += '<div class="ei-detail-row"><span class="ei-detail-label">Shift</span><span class="ei-detail-val">' + r.shift + (r.isLate ? ' <span class="badge badge-warning">LATE</span>' : '') + '</span></div>';
  html += '<div class="ei-detail-row"><span class="ei-detail-label">Status</span><span class="ei-detail-val"><span class="badge ' + (r.status === 'FLAGGED' ? 'badge-danger' : 'badge-success') + '">' + r.status + '</span></span></div>';
  html += '<div class="ei-detail-row"><span class="ei-detail-label">Supervisor</span><span class="ei-detail-val">' + esc(r.supervisor ? r.supervisor.name : '—') + '</span></div>';
  html += '<div class="ei-detail-row"><span class="ei-detail-label">Workers</span><span class="ei-detail-val">' + (r.workers || []).map(function(w){ return esc(w.name); }).join(', ') + '</span></div>';
  html += '<div class="ei-detail-row"><span class="ei-detail-label">Inspected At</span><span class="ei-detail-val">' + App.fmtDateShort(r.inspectedAt) + '</span></div>';

  if (r.isLate && r.lateReason) {
    html += '<div style="padding:.5rem .7rem;background:var(--warning-bg);border:1px solid var(--warning);border-radius:var(--radius-sm);margin:.5rem 0;font-size:.78rem"><b>Late reason:</b> ' + esc(r.lateReason) + '</div>';
  }
  if (r.status === 'FLAGGED' && r.flagReason) {
    html += '<div style="padding:.5rem .7rem;background:rgba(239,68,68,.06);border:1px solid var(--danger);border-radius:var(--radius-sm);margin:.5rem 0;font-size:.78rem"><b>Flag reason:</b> ' + esc(r.flagReason) + '</div>';
  }

  // Checklist items — show reading + template name
  var templateInfo = r.template ? ' <span style="font-size:.68rem;color:var(--text-light)">(Template: ' + esc(r.template.name) + ')</span>' : '';
  html += '<div style="margin-top:.75rem;font-weight:600;font-size:.82rem">Checklist (' + r.faultyCount + ' fault' + (r.faultyCount !== 1 ? 's' : '') + ')' + templateInfo + '</div>';
  html += '<ul class="ei-check-list">';
  (r.items || []).forEach(function(item) {
    var stCls = item.status === 'OK' || item.status === 'YES' ? 'ei-check-ok' : item.status === 'FAULTY' || item.status === 'NO' ? 'ei-check-faulty' : 'ei-check-na';
    html += '<li><span class="ei-check-status ' + stCls + '">' + item.status + '</span> ' + (CHECK_LABELS[item.checkType] || item.checkType);
    if (item.reading != null) html += ' <span style="font-size:.72rem;color:var(--info-text);font-weight:600">[' + item.reading + ']</span>';
    if (item.remarks) html += '<span class="ei-check-remarks">— ' + esc(item.remarks) + '</span>';
    html += '</li>';
  });
  html += '</ul>';

  if (r.notes) html += '<div class="ei-detail-row" style="margin-top:.5rem"><span class="ei-detail-label">Notes</span><span class="ei-detail-val">' + esc(r.notes) + '</span></div>';

  // Images
  if (r.images && r.images.length) {
    html += '<div style="margin-top:.75rem;font-weight:600;font-size:.82rem">Photos (' + r.images.length + ')</div>';
    html += '<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.35rem">';
    r.images.forEach(function(img) {
      html += '<img src="' + esc(img.imageUrl) + '" style="width:64px;height:64px;object-fit:cover;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border)" onclick="openLightbox(\'' + esc(img.imageUrl) + '\')">';
    });
    html += '</div>';
  }

  $('detailContent').innerHTML = html;

  // Flag button
  var flagBtn = $('flagBtn');
  flagBtn.textContent = r.status === 'FLAGGED' ? 'Unflag' : 'Flag';
  flagBtn.className = r.status === 'FLAGGED' ? 'btn btn-outline' : 'btn btn-danger';
  flagBtn.onclick = function() { toggleFlag(r.id, r.status); };

  App.openModal('detailModal');
}

async function toggleFlag(id, currentStatus) {
  var reason = '';
  if (currentStatus !== 'FLAGGED') {
    reason = prompt('Flag reason (optional):') || '';
  }
  var res = await App.apiFetch('/electrical-inspections/' + id + '/flag', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ reason: reason })
  });
  if (res && res.ok) {
    App.toast(currentStatus === 'FLAGGED' ? 'Unflagged' : 'Flagged', 'success');
    App.closeModal('detailModal');
    loadRecords(currentPage);
  }
}

function openLightbox(url) { $('lightboxImg').src = url; $('lightbox').classList.add('active'); }
function closeLightbox() { $('lightbox').classList.remove('active'); $('lightboxImg').src = ''; }

// ── Load locations ──
async function loadLocations() {
  var res = await App.apiFetch('/locations/tree?active=true');
  if (!res) return;
  var tree = await res.json();
  var opts = '<option value="">All Locations</option>';
  function flatten(nodes, prefix) {
    for (var i = 0; i < nodes.length; i++) {
      opts += '<option value="' + nodes[i].id + '">' + esc(prefix + nodes[i].name) + '</option>';
      if (nodes[i].children) flatten(nodes[i].children, prefix + nodes[i].name + ' → ');
    }
  }
  flatten(tree, '');
  $('filterLocation').innerHTML = opts;
}

// ── CSV ──
async function exportCSV() {
  var params = [];
  var shift = $('filterShift').value; if (shift) params.push('shift=' + shift);
  var status = $('filterStatus').value; if (status) params.push('status=' + status);
  var loc = $('filterLocation').value; if (loc) params.push('locationId=' + loc);
  var late = $('filterLate').value; if (late) params.push('isLate=' + late);
  var from = $('filterFrom').value; if (from) params.push('from=' + from);
  var to = $('filterTo').value; if (to) params.push('to=' + to);

  var res = await App.apiFetch('/electrical-inspections/export?' + params.join('&'));
  if (!res) return;
  var blob = await res.blob();
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'electrical-inspections-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// Init
loadLocations();
loadRecords(1);
</script>
</body>
</html>
