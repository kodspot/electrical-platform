<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#1E40AF">
<title>Alerts & Automation — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/design-system.css?v=10">
<style>
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:1rem;gap:0}
.tab{padding:.55rem 1.1rem;font-size:.82rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-muted);transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-panel{display:none}.tab-panel.active{display:block}

.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.85rem;margin-bottom:.5rem;position:relative}
.alert-card.unack{border-left:3px solid var(--warning-text)}
.alert-sev{display:inline-block;font-size:.65rem;font-weight:700;padding:.1rem .4rem;border-radius:3px;text-transform:uppercase}
.sev-INFO{background:rgba(99,102,241,.12);color:#818cf8}
.sev-WARNING{background:rgba(245,158,11,.12);color:var(--warning-text)}
.sev-HIGH{background:rgba(249,115,22,.12);color:#f97316}
.sev-CRITICAL{background:rgba(239,68,68,.12);color:var(--danger)}
.alert-title{font-weight:600;font-size:.85rem;margin:.25rem 0 .15rem}
.alert-body{font-size:.75rem;color:var(--text-muted);margin-bottom:.35rem}
.alert-meta{font-size:.68rem;color:var(--text-muted);display:flex;gap:.75rem;flex-wrap:wrap}
.alert-ack-btn{position:absolute;top:.75rem;right:.75rem}

.rule-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.85rem;margin-bottom:.5rem;display:flex;align-items:flex-start;gap:.75rem}
.rule-card.inactive{opacity:.5}
.rule-icon{width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.rule-content{flex:1;min-width:0}
.rule-name{font-weight:600;font-size:.85rem}
.rule-trigger{font-size:.7rem;padding:.1rem .35rem;border-radius:3px;background:var(--bg);font-weight:600;margin-left:.35rem}
.rule-desc{font-size:.75rem;color:var(--text-muted);margin:.2rem 0}
.rule-actions-list{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.3rem}
.rule-action-tag{font-size:.62rem;padding:.1rem .3rem;border-radius:3px;background:rgba(8,145,178,.1);color:#0891b2;font-weight:600}

.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;margin-bottom:.65rem;cursor:pointer;transition:border-color .15s}
.insight-card:hover{border-color:var(--primary)}
.insight-card.unread{border-left:3px solid var(--primary)}
.insight-title{font-weight:600;font-size:.88rem}
.insight-type{font-size:.65rem;padding:.1rem .35rem;border-radius:3px;background:rgba(139,92,246,.1);color:#8b5cf6;font-weight:600;margin-left:.35rem}
.insight-date{font-size:.7rem;color:var(--text-muted);margin-top:.2rem}
.insight-content{font-size:.82rem;line-height:1.6;margin-top:.65rem}
.insight-content strong{color:var(--text)}
.insight-content ul{padding-left:1.2rem;margin:.3rem 0}
.insight-content li{margin-bottom:.2rem}

.trigger-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.4rem;margin:.5rem 0}
.trigger-opt{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.5rem;cursor:pointer;text-align:center;font-size:.78rem;transition:border-color .15s}
.trigger-opt:hover,.trigger-opt.selected{border-color:var(--primary);background:rgba(8,145,178,.06)}
.trigger-opt .t-icon{font-size:1.3rem;display:block;margin-bottom:.15rem}
.trigger-opt .t-label{font-weight:600}

.cond-field{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem}
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-left">
    <span class="topbar-brand">⚡ Kodspot</span>
    <div class="topbar-nav" id="topbar-nav"></div>
  </div>
  <div class="topbar-right">
    <span class="topbar-user" id="userName"></span>
    <div id="sa-banner" class="sa-banner" style="display:none"></div>
  </div>
</nav>

<div class="page-shell">
  <div class="page-header">
    <div>
      <h1 class="page-title">Alerts & Automation</h1>
      <p class="page-subtitle">Configure alert rules, view history, and AI-generated insights</p>
    </div>
  </div>

  <!-- Stats row -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card"><div class="stat-value" id="statUnack">–</div><div class="stat-label">Unacknowledged</div></div>
    <div class="stat-card"><div class="stat-value" id="statToday">–</div><div class="stat-label">Today</div></div>
    <div class="stat-card"><div class="stat-value" id="statWeek">–</div><div class="stat-label">This Week</div></div>
    <div class="stat-card"><div class="stat-value" id="statRules">–</div><div class="stat-label">Active Rules</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('rules')">Rules</div>
    <div class="tab" onclick="switchTab('history')">Alert History</div>
    <div class="tab" onclick="switchTab('insights')">AI Insights</div>
  </div>

  <!-- ═══ RULES TAB ═══ -->
  <div class="tab-panel active" id="panel-rules">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
      <div style="font-size:.82rem;color:var(--text-muted)" id="rulesCount"></div>
      <button class="btn btn-primary btn-sm" onclick="openCreateRule()">+ New Rule</button>
    </div>
    <div id="rulesList"></div>
  </div>

  <!-- ═══ HISTORY TAB ═══ -->
  <div class="tab-panel" id="panel-history">
    <div class="filter-bar" style="margin-bottom:.75rem">
      <select class="form-select form-select-sm" id="hfTrigger" onchange="loadAlerts()">
        <option value="">All Triggers</option>
        <option value="INSPECTION_FAULT">Inspection Fault</option>
        <option value="INSPECTION_LATE">Inspection Late</option>
        <option value="INSPECTION_MISSED">Inspection Missed</option>
        <option value="ASSET_FAILURE_REPORTED">Asset Failure</option>
        <option value="ASSET_FAILURE_UNRESOLVED">Failure Unresolved</option>
        <option value="ASSET_MAINTENANCE_OVERDUE">Maintenance Overdue</option>
        <option value="TICKET_HIGH_PRIORITY">High Priority Ticket</option>
        <option value="ATTENDANCE_LOW">Low Attendance</option>
      </select>
      <select class="form-select form-select-sm" id="hfSeverity" onchange="loadAlerts()">
        <option value="">All Severities</option>
        <option value="CRITICAL">Critical</option>
        <option value="HIGH">High</option>
        <option value="WARNING">Warning</option>
        <option value="INFO">Info</option>
      </select>
      <select class="form-select form-select-sm" id="hfAck" onchange="loadAlerts()">
        <option value="">All</option>
        <option value="false">Unacknowledged</option>
        <option value="true">Acknowledged</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="acknowledgeAll()" id="ackAllBtn" style="display:none">✓ Ack All</button>
    </div>
    <div id="alertsList"></div>
    <div id="alertsPager" class="pager" style="margin-top:.5rem"></div>
  </div>

  <!-- ═══ AI INSIGHTS TAB ═══ -->
  <div class="tab-panel" id="panel-insights">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
      <div style="font-size:.82rem;color:var(--text-muted)" id="insightsCount"></div>
      <button class="btn btn-sm btn-outline" onclick="triggerInsightGen()" id="genInsightBtn">🤖 Generate Now</button>
    </div>
    <div id="insightsList"></div>
  </div>
</div>

<!-- ═══ CREATE/EDIT RULE MODAL ═══ -->
<div class="modal-overlay" id="ruleModal">
  <div class="modal" style="max-width:560px">
    <h2 class="modal-title" id="ruleModalTitle">New Alert Rule</h2>
    <div id="ruleError" class="error-msg"></div>
    <form id="ruleForm">
      <div><label class="form-label">Rule Name *</label><input class="form-input" id="rfName" required maxlength="200" placeholder="e.g. Critical failure alert"></div>
      <div style="margin-top:.5rem"><label class="form-label">Description</label><input class="form-input" id="rfDesc" maxlength="1000" placeholder="Optional description"></div>

      <div style="margin-top:.65rem"><label class="form-label">Trigger Event *</label></div>
      <div class="trigger-grid" id="triggerGrid"></div>

      <div id="conditionsArea" style="margin-top:.65rem;display:none">
        <label class="form-label">Conditions</label>
        <div id="condFields" class="cond-field"></div>
      </div>

      <div style="margin-top:.65rem">
        <label class="form-label">Actions *</label>
        <div style="display:flex;flex-direction:column;gap:.35rem">
          <label class="form-check"><input type="checkbox" id="actNotifyAdmins" checked> Notify Admins</label>
          <label class="form-check"><input type="checkbox" id="actNotifySups"> Notify Supervisors</label>
          <label class="form-check"><input type="checkbox" id="actCreateTicket"> Auto-create Ticket</label>
        </div>
        <div id="ticketPriorityWrap" style="display:none;margin-top:.35rem">
          <label class="form-label">Ticket Priority</label>
          <select class="form-select" id="actTicketPriority"><option value="HIGH">High</option><option value="URGENT">Urgent</option><option value="NORMAL">Normal</option></select>
        </div>
      </div>

      <div style="margin-top:.65rem"><label class="form-check"><input type="checkbox" id="rfActive" checked> Active</label></div>

      <!-- Escalation Policy -->
      <div style="margin-top:.75rem;border-top:1px solid var(--border);padding-top:.65rem">
        <label class="form-check"><input type="checkbox" id="rfEscalate" onchange="toggleEscalation()"> Enable Escalation</label>
        <div id="escalationArea" style="display:none;margin-top:.5rem">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
            <div><label class="form-label">Escalate After (minutes)</label><input class="form-input" id="rfEscMins" type="number" min="1" max="10080" placeholder="30" value="30"></div>
            <div><label class="form-label">Max Escalations</label><input class="form-input" id="rfMaxEsc" type="number" min="1" max="10" placeholder="1" value="1"></div>
          </div>
          <div style="margin-top:.5rem"><label class="form-label">Escalation Actions</label>
            <div style="display:flex;flex-direction:column;gap:.3rem">
              <label class="form-check"><input type="checkbox" id="escNotifyAdmins" checked> Notify Admins</label>
              <label class="form-check"><input type="checkbox" id="escNotifySups"> Notify Supervisors</label>
              <label class="form-check"><input type="checkbox" id="escCreateTicket" onchange="toggleEscTicketPri()"> Auto-create Ticket</label>
            </div>
            <div id="escTicketPriWrap" style="display:none;margin-top:.35rem">
              <label class="form-label">Ticket Priority</label>
              <select class="form-select" id="escTicketPriority"><option value="URGENT">Urgent</option><option value="HIGH">High</option></select>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="App.closeModal('ruleModal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="ruleSubmitBtn">Create Rule</button>
      </div>
    </form>
  </div>
</div>

<!-- ═══ INSIGHT DETAIL MODAL ═══ -->
<div class="modal-overlay" id="insightModal">
  <div class="modal" style="max-width:600px">
    <h2 class="modal-title" id="insightDetailTitle">AI Insight</h2>
    <div class="insight-content" id="insightDetailContent"></div>
    <div style="margin-top:.75rem;font-size:.7rem;color:var(--text-muted)" id="insightDetailMeta"></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-outline" onclick="App.closeModal('insightModal')">Close</button>
    </div>
  </div>
</div>

<script src="/js/offline-sync.js?v=1"></script>
<script src="/js/app.js?v=14"></script>
<script>
if (!App.initAdmin('admin-alerts')) throw '';
var esc = App.esc, $ = App.$, apiFetch = App.apiFetch;

// ─── Trigger definitions ───
var TRIGGERS = [
  { key:'INSPECTION_FAULT', icon:'⚡', label:'Inspection Faults', condFields:[{key:'minFaults',label:'Min Faults',type:'number',placeholder:'1',default:1}]},
  { key:'INSPECTION_LATE', icon:'⏰', label:'Late Inspection', condFields:[]},
  { key:'INSPECTION_MISSED', icon:'🚫', label:'Missed Inspection', condFields:[{key:'byHour',label:'By Hour (24h)',type:'number',placeholder:'14',default:14}]},
  { key:'ASSET_FAILURE_REPORTED', icon:'🔴', label:'Asset Failure', condFields:[{key:'minSeverity',label:'Min Severity',type:'select',options:['LOW','MEDIUM','HIGH','CRITICAL'],default:'HIGH'}]},
  { key:'ASSET_FAILURE_UNRESOLVED', icon:'⏳', label:'Failure Unresolved', condFields:[{key:'hoursOpen',label:'Hours Open',type:'number',placeholder:'24',default:24}]},
  { key:'ASSET_MAINTENANCE_OVERDUE', icon:'🔧', label:'Maintenance Overdue', condFields:[{key:'daysPastDue',label:'Days Past Due',type:'number',placeholder:'1',default:1}]},
  { key:'TICKET_HIGH_PRIORITY', icon:'🎫', label:'High Priority Ticket', condFields:[{key:'minPriority',label:'Min Priority',type:'select',options:['NORMAL','HIGH','URGENT'],default:'HIGH'}]},
  { key:'ATTENDANCE_LOW', icon:'👥', label:'Low Attendance', condFields:[{key:'minAbsent',label:'Min Absent',type:'number',placeholder:'3',default:3}]}
];
var TRIGGER_MAP = {}; TRIGGERS.forEach(function(t){ TRIGGER_MAP[t.key]=t; });
var selectedTrigger = null;
var editingRuleId = null;
var alertPage = 1;

// ─── Tabs ───
function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(t,i){ t.classList.toggle('active', ['rules','history','insights'][i]===name); });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.toggle('active', p.id==='panel-'+name); });
  if(name==='rules') loadRules();
  if(name==='history'){ alertPage=1; loadAlerts(); }
  if(name==='insights') loadInsights();
}

// ─── Load summary stats ───
async function loadSummary(){
  var res = await apiFetch('/alerts/summary');
  if(!res||!res.ok) return;
  var d = await res.json();
  $('statUnack').textContent = d.unacknowledged;
  $('statToday').textContent = d.today;
  $('statWeek').textContent = d.thisWeek;
}

// ─── RULES ───
async function loadRules(){
  var res = await apiFetch('/alert-rules');
  if(!res||!res.ok) return;
  var d = await res.json();
  var rules = d.rules||[];
  $('statRules').textContent = rules.filter(function(r){return r.isActive}).length;
  $('rulesCount').textContent = rules.length + ' rule(s)';

  if(!rules.length){
    $('rulesList').innerHTML='<div style="text-align:center;padding:2rem;color:var(--text-muted)">No alert rules configured yet. Create your first rule to start receiving automated alerts.</div>';
    return;
  }

  $('rulesList').innerHTML = rules.map(function(r){
    var t = TRIGGER_MAP[r.trigger]||{icon:'🔔',label:r.trigger};
    var actions = (r.actions||[]).map(function(a){
      var labels = {NOTIFY_ADMINS:'Notify Admins',NOTIFY_SUPERVISORS:'Notify Supervisors',CREATE_TICKET:'Create Ticket'};
      return '<span class="rule-action-tag">'+(labels[a.type]||a.type)+'</span>';
    }).join('');
    return '<div class="rule-card'+(r.isActive?'':' inactive')+'">'+
      '<div class="rule-icon" style="background:var(--bg)">'+t.icon+'</div>'+
      '<div class="rule-content"><div><span class="rule-name">'+esc(r.name)+'</span><span class="rule-trigger">'+t.label+'</span></div>'+
      (r.description?'<div class="rule-desc">'+esc(r.description)+'</div>':'')+
      '<div class="rule-actions-list">'+actions+'</div>'+
      '<div style="font-size:.68rem;color:var(--text-muted);margin-top:.25rem">'+
      (r._count?r._count.alerts+' alerts fired':'')+(r.isActive?'':' · <span style="color:var(--danger)">Disabled</span>')+
      (r.escalateAfterMinutes?' · <span style="color:var(--warning-text)">⏱ Escalates after '+r.escalateAfterMinutes+'min</span>':'')+
      '</div></div>'+
      '<div style="display:flex;gap:.35rem">'+
      '<button class="btn btn-sm btn-ghost" onclick="editRule(\''+r.id+'\')">Edit</button>'+
      '<button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick="deleteRule(\''+r.id+'\',\''+esc(r.name).replace(/'/g,"\\'")+'\')">Delete</button>'+
      '</div></div>';
  }).join('');
}

function buildTriggerGrid(){
  $('triggerGrid').innerHTML = TRIGGERS.map(function(t){
    return '<div class="trigger-opt" data-trigger="'+t.key+'" onclick="selectTrigger(\''+t.key+'\')">'+
      '<span class="t-icon">'+t.icon+'</span><span class="t-label">'+t.label+'</span></div>';
  }).join('');
}

function selectTrigger(key){
  selectedTrigger = key;
  document.querySelectorAll('.trigger-opt').forEach(function(el){ el.classList.toggle('selected', el.dataset.trigger===key); });
  var t = TRIGGER_MAP[key];
  if(t.condFields.length){
    $('conditionsArea').style.display='';
    $('condFields').innerHTML = t.condFields.map(function(f){
      if(f.type==='select'){
        return '<div><label class="form-label">'+f.label+'</label><select class="form-select" id="cond_'+f.key+'">'+
          f.options.map(function(o){ return '<option value="'+o+'"'+(o===f.default?' selected':'')+'>'+o+'</option>'; }).join('')+'</select></div>';
      }
      return '<div><label class="form-label">'+f.label+'</label><input class="form-input" id="cond_'+f.key+'" type="number" min="0" placeholder="'+f.placeholder+'" value="'+(f.default||'')+'"></div>';
    }).join('');
  } else {
    $('conditionsArea').style.display='none';
    $('condFields').innerHTML='';
  }
}

function openCreateRule(){
  editingRuleId = null;
  $('ruleModalTitle').textContent = 'New Alert Rule';
  $('ruleSubmitBtn').textContent = 'Create Rule';
  $('ruleForm').reset();
  $('actNotifyAdmins').checked = true;
  $('rfActive').checked = true;
  $('rfEscalate').checked = false;
  toggleEscalation();
  selectedTrigger = null;
  buildTriggerGrid();
  $('conditionsArea').style.display='none';
  App.hideError('ruleError');
  App.openModal('ruleModal');
}

async function editRule(id){
  var res = await apiFetch('/alert-rules/'+id);
  if(!res||!res.ok) return;
  var r = await res.json();
  editingRuleId = r.id;
  $('ruleModalTitle').textContent = 'Edit Rule';
  $('ruleSubmitBtn').textContent = 'Save Changes';
  $('rfName').value = r.name;
  $('rfDesc').value = r.description||'';
  $('rfActive').checked = r.isActive;

  buildTriggerGrid();
  selectTrigger(r.trigger);

  // Fill conditions
  var cond = r.conditions||{};
  var t = TRIGGER_MAP[r.trigger];
  if(t) t.condFields.forEach(function(f){
    var el = document.getElementById('cond_'+f.key);
    if(el && cond[f.key]!==undefined) el.value = cond[f.key];
  });

  // Fill actions
  var actions = r.actions||[];
  var actionTypes = actions.map(function(a){return a.type});
  $('actNotifyAdmins').checked = actionTypes.indexOf('NOTIFY_ADMINS')!==-1;
  $('actNotifySups').checked = actionTypes.indexOf('NOTIFY_SUPERVISORS')!==-1;
  $('actCreateTicket').checked = actionTypes.indexOf('CREATE_TICKET')!==-1;
  var ticketAction = actions.find(function(a){return a.type==='CREATE_TICKET'});
  if(ticketAction) $('actTicketPriority').value = ticketAction.priority||'HIGH';
  updateTicketPriorityVis();

  // Escalation fields
  if(r.escalateAfterMinutes){
    $('rfEscalate').checked = true;
    toggleEscalation();
    $('rfEscMins').value = r.escalateAfterMinutes;
    $('rfMaxEsc').value = r.maxEscalations||1;
    var escActs = r.escalationActions||[];
    var escTypes = escActs.map(function(a){return a.type});
    $('escNotifyAdmins').checked = escTypes.indexOf('NOTIFY_ADMINS')!==-1;
    $('escNotifySups').checked = escTypes.indexOf('NOTIFY_SUPERVISORS')!==-1;
    $('escCreateTicket').checked = escTypes.indexOf('CREATE_TICKET')!==-1;
    var escTicket = escActs.find(function(a){return a.type==='CREATE_TICKET'});
    if(escTicket) $('escTicketPriority').value = escTicket.priority||'URGENT';
    toggleEscTicketPri();
  } else {
    $('rfEscalate').checked = false;
    toggleEscalation();
  }

  App.hideError('ruleError');
  App.openModal('ruleModal');
}

async function deleteRule(id, name){
  if(!confirm('Delete rule "'+name+'"? This cannot be undone.')) return;
  var res = await apiFetch('/alert-rules/'+id,{method:'DELETE'});
  if(res&&res.ok) loadRules();
}

function updateTicketPriorityVis(){
  $('ticketPriorityWrap').style.display = $('actCreateTicket').checked?'':'none';
}
$('actCreateTicket').addEventListener('change', updateTicketPriorityVis);

function toggleEscalation(){
  $('escalationArea').style.display = $('rfEscalate').checked ? '' : 'none';
}
function toggleEscTicketPri(){
  $('escTicketPriWrap').style.display = $('escCreateTicket').checked ? '' : 'none';
}

$('ruleForm').addEventListener('submit', async function(e){
  e.preventDefault();
  App.hideError('ruleError');
  if(!selectedTrigger){ App.showError('ruleError','Please select a trigger event'); return; }

  var actions = [];
  if($('actNotifyAdmins').checked) actions.push({type:'NOTIFY_ADMINS'});
  if($('actNotifySups').checked) actions.push({type:'NOTIFY_SUPERVISORS'});
  if($('actCreateTicket').checked) actions.push({type:'CREATE_TICKET', priority:$('actTicketPriority').value});
  if(!actions.length){ App.showError('ruleError','Select at least one action'); return; }

  var conditions = {};
  var t = TRIGGER_MAP[selectedTrigger];
  if(t) t.condFields.forEach(function(f){
    var el = document.getElementById('cond_'+f.key);
    if(el){
      var v = el.value;
      if(f.type==='number' && v) conditions[f.key] = parseInt(v);
      else if(v) conditions[f.key] = v;
    }
  });

  var body = {
    name: $('rfName').value.trim(),
    description: $('rfDesc').value.trim()||undefined,
    trigger: selectedTrigger,
    conditions: conditions,
    actions: actions,
    isActive: $('rfActive').checked
  };

  // Escalation policy
  if($('rfEscalate').checked){
    body.escalateAfterMinutes = parseInt($('rfEscMins').value)||30;
    body.maxEscalations = parseInt($('rfMaxEsc').value)||1;
    var escActions = [];
    if($('escNotifyAdmins').checked) escActions.push({type:'NOTIFY_ADMINS'});
    if($('escNotifySups').checked) escActions.push({type:'NOTIFY_SUPERVISORS'});
    if($('escCreateTicket').checked) escActions.push({type:'CREATE_TICKET',priority:$('escTicketPriority').value});
    body.escalationActions = escActions.length ? escActions : null;
  } else {
    body.escalateAfterMinutes = null;
    body.escalationActions = null;
    body.maxEscalations = null;
  }

  var btn = $('ruleSubmitBtn'); btn.disabled = true;
  try{
    var url = editingRuleId ? '/alert-rules/'+editingRuleId : '/alert-rules';
    var method = editingRuleId ? 'PATCH' : 'POST';
    var res = await apiFetch(url, {method:method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    if(!res){btn.disabled=false;return;}
    if(!res.ok){var d=await res.json();App.showError('ruleError',d.error||'Failed');btn.disabled=false;return;}
    App.closeModal('ruleModal');
    loadRules();
  }catch(err){App.showError('ruleError','Network error');}
  btn.disabled = false;
});

// ─── ALERT HISTORY ───
async function loadAlerts(){
  var trigger = $('hfTrigger').value;
  var severity = $('hfSeverity').value;
  var acknowledged = $('hfAck').value;

  var qs = '?page='+alertPage+'&limit=30';
  if(trigger) qs+='&trigger='+trigger;
  if(severity) qs+='&severity='+severity;
  if(acknowledged) qs+='&acknowledged='+acknowledged;

  var res = await apiFetch('/alerts'+qs);
  if(!res||!res.ok) return;
  var d = await res.json();
  var alerts = d.alerts||[];

  $('ackAllBtn').style.display = d.unacknowledged>0?'':'none';

  if(!alerts.length){
    $('alertsList').innerHTML='<div style="text-align:center;padding:2rem;color:var(--text-muted)">No alerts match the current filters.</div>';
    $('alertsPager').innerHTML='';
    return;
  }

  $('alertsList').innerHTML = alerts.map(function(a){
    var t = TRIGGER_MAP[a.trigger]||{icon:'🔔',label:a.trigger};
    var ackBtn = a.acknowledged?'<span style="font-size:.68rem;color:var(--success)">✓ Acked</span>':
      '<button class="btn btn-sm btn-outline alert-ack-btn" onclick="ackAlert(\''+a.id+'\')">Acknowledge</button>';
    return '<div class="alert-card'+(a.acknowledged?'':' unack')+'">'+
      '<div style="display:flex;align-items:center;gap:.5rem"><span class="alert-sev sev-'+a.severity+'">'+a.severity+'</span>'+
      '<span style="font-size:.72rem;color:var(--text-muted)">'+t.icon+' '+t.label+'</span></div>'+
      '<div class="alert-title">'+esc(a.title)+'</div>'+
      (a.body?'<div class="alert-body">'+esc(a.body).substring(0,200)+'</div>':'')+
      '<div class="alert-meta"><span>'+App.fmtDateShort(a.createdAt)+'</span>'+
      (a.rule?'<span>Rule: '+esc(a.rule.name)+'</span>':'')+
      (a.entityType?'<span>'+a.entityType+'</span>':'')+
      (a.escalationLevel?'<span style="color:var(--warning-text)">⏱ Escalation L'+a.escalationLevel+'</span>':'')+
      '</div>'+ackBtn+'</div>';
  }).join('');

  // Pager
  var totalPages = d.pages||1;
  if(totalPages>1){
    var html = '';
    for(var p=1;p<=totalPages;p++){
      html+='<button class="btn btn-sm '+(p===alertPage?'btn-primary':'btn-ghost')+'" onclick="alertPage='+p+';loadAlerts()">'+p+'</button>';
    }
    $('alertsPager').innerHTML = html;
  } else $('alertsPager').innerHTML='';
}

async function ackAlert(id){
  var res = await apiFetch('/alerts/'+id+'/acknowledge',{method:'PATCH'});
  if(res&&res.ok){ loadAlerts(); loadSummary(); }
}

async function acknowledgeAll(){
  if(!confirm('Acknowledge all unacknowledged alerts?')) return;
  var res = await apiFetch('/alerts/acknowledge-all',{method:'PATCH'});
  if(res&&res.ok){ loadAlerts(); loadSummary(); }
}

// ─── AI INSIGHTS ───
async function loadInsights(){
  var res = await apiFetch('/ai-insights?limit=20');
  if(!res||!res.ok) return;
  var d = await res.json();
  var insights = d.insights||[];
  $('insightsCount').textContent = d.total+' insight(s)' + (d.unread?' · '+d.unread+' unread':'');

  if(!insights.length){
    $('insightsList').innerHTML='<div style="text-align:center;padding:2rem;color:var(--text-muted)">No AI insights yet. Insights are generated daily when AI is enabled for your organization.</div>';
    return;
  }

  $('insightsList').innerHTML = insights.map(function(ins){
    var typeLabels = {daily_summary:'Daily Summary',weekly_report:'Weekly Report',anomaly:'Anomaly',trend_alert:'Trend Alert',recommendation:'Recommendation'};
    return '<div class="insight-card'+(ins.isRead?'':' unread')+'" onclick="viewInsight(\''+ins.id+'\')">'+
      '<div><span class="insight-title">'+esc(ins.title)+'</span><span class="insight-type">'+(typeLabels[ins.type]||ins.type)+'</span></div>'+
      '<div class="insight-date">'+App.fmtDateShort(ins.createdAt)+
      (ins.metadata&&ins.metadata.totalTokens?' · '+ins.metadata.totalTokens+' tokens':'')+
      '</div></div>';
  }).join('');
}

async function viewInsight(id){
  var res = await apiFetch('/ai-insights/'+id);
  if(!res||!res.ok) return;
  var ins = await res.json();
  $('insightDetailTitle').textContent = ins.title;
  $('insightDetailContent').innerHTML = simpleMarkdown(ins.content);
  var meta = [];
  if(ins.period) meta.push('Period: '+ins.period);
  if(ins.metadata){
    if(ins.metadata.provider) meta.push('Provider: '+ins.metadata.provider);
    if(ins.metadata.model) meta.push('Model: '+ins.metadata.model);
    if(ins.metadata.latencyMs) meta.push('Latency: '+ins.metadata.latencyMs+'ms');
    if(ins.metadata.totalTokens) meta.push('Tokens: '+ins.metadata.totalTokens);
  }
  $('insightDetailMeta').textContent = meta.join(' · ');
  App.openModal('insightModal');
  loadInsights(); // refresh read state
}

async function triggerInsightGen(){
  var btn=$('genInsightBtn'); btn.disabled=true; btn.textContent='Generating…';
  var res = await apiFetch('/ai-insights/generate',{method:'POST'});
  btn.disabled=false; btn.textContent='🤖 Generate Now';
  if(res&&res.ok){
    App.toast('AI insight generation started. Refresh in a moment.');
    setTimeout(loadInsights, 5000);
  } else {
    var d = res?await res.json().catch(function(){return{}}):{}; 
    App.toast(d.error||'Failed to start generation','error');
  }
}

// ─── Simple markdown renderer ───
function simpleMarkdown(text){
  if(!text) return '';
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s,function(m){ return '<ul>'+m+'</ul>'; })
    .replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>')
    .replace(/\n{2,}/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

// ─── Boot ───
loadSummary();
loadRules();
</script>
