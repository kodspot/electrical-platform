<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#1E40AF">
<title>Kodspot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/design-system.css?v=10">
<style>
.mod-home{max-width:420px;margin:0 auto;padding:2rem 1rem;text-align:center}
.mod-title{font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:.15rem;text-shadow:0 4px 18px rgba(0,0,0,.25)}
.mod-subtitle{font-size:.82rem;color:rgba(255,255,255,.8);margin-bottom:.35rem}
.mod-org{font-size:.72rem;color:rgba(255,255,255,.72);margin-bottom:1.5rem}
.role-grid{display:flex;flex-direction:column;gap:.75rem}
.role-card{text-decoration:none;color:inherit;border:1px solid rgba(255,255,255,.24);border-radius:var(--radius-lg);padding:1.15rem 1.25rem;text-align:left;transition:all .15s;cursor:pointer;background:rgba(255,255,255,.92);display:flex;align-items:center;gap:1rem;backdrop-filter:blur(8px)}
.role-card:hover{border-color:#fff;box-shadow:0 10px 28px rgba(0,0,0,.16);transform:translateY(-2px)}
.role-icon{font-size:1.5rem;flex-shrink:0}
.role-info{flex:1}
.role-label{font-size:1rem;font-weight:600;color:var(--text)}
.role-desc{font-size:.75rem;color:var(--text-muted);margin-top:.1rem}
.mod-back{margin-top:1.25rem;font-size:.78rem}
.mod-install-hint{margin-top:1.5rem;padding:.75rem;background:rgba(255,255,255,.9);border:1px dashed rgba(255,255,255,.35);border-radius:var(--radius);font-size:.72rem;color:#334155}
.mod-loading{padding:3rem 1rem;text-align:center;color:var(--text-muted)}
</style>
</head>
<body class="auth-layout">
<div class="mod-home" id="root">
  <div class="mod-loading">
    <div class="skeleton" style="width:50%;height:1.3rem;margin:0 auto .5rem"></div>
    <div class="skeleton" style="width:70%;height:.8rem;margin:0 auto 1.5rem"></div>
    <div class="skeleton" style="height:70px;border-radius:var(--radius-lg);margin-bottom:.75rem"></div>
    <div class="skeleton" style="height:70px;border-radius:var(--radius-lg)"></div>
  </div>
</div>
<footer style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:.8rem;font-size:.75rem;color:var(--text-muted)">
  <a href="/privacy" style="color:var(--text-muted);text-decoration:underline">Privacy Policy</a> · <a href="/terms" style="color:var(--text-muted);text-decoration:underline">Terms of Service</a>
</footer>
<script>
(function() {
  var MODULE_META = {
    ele:        { label: 'Electrical', icon: '⚡', color: '#d97706', roles: [
      { key: 'admin', label: 'Admin', icon: '🔑', desc: 'Manage full setup, users, analytics and operations', page: 'admin-login' },
      { key: 'supervisor', label: 'Supervisor', icon: '🧭', desc: 'Oversee assigned building/floor operations and escalations', page: 'supervisor-login' },
      { key: 'electrician', label: 'Electrician', icon: '🛠️', desc: 'View assigned tickets, fix issues and upload proof photos', page: 'electrician-login' }
    ]},
    civil:      { label: 'Civil', icon: '🏗️', color: '#6366f1', roles: [
      { key: 'admin', label: 'Admin', icon: '🔑', desc: 'Manage full setup, users, analytics and operations', page: 'admin-login' },
      { key: 'supervisor', label: 'Supervisor', icon: '🧭', desc: 'Oversee assigned building/floor operations and escalations', page: 'supervisor-login' },
      { key: 'electrician', label: 'Electrician', icon: '🛠️', desc: 'View assigned tickets, fix issues and upload proof photos', page: 'electrician-login' }
    ]},
    asset:      { label: 'Assets', icon: '📦', color: '#0891b2', roles: [
      { key: 'admin', label: 'Admin', icon: '🔑', desc: 'Manage full setup, users, analytics and operations', page: 'admin-login' },
      { key: 'supervisor', label: 'Supervisor', icon: '🧭', desc: 'Oversee assigned building/floor operations and escalations', page: 'supervisor-login' },
      { key: 'electrician', label: 'Electrician', icon: '🛠️', desc: 'View assigned tickets, fix issues and upload proof photos', page: 'electrician-login' }
    ]},
    complaints: { label: 'Complaints', icon: '📝', color: '#e11d48', roles: [
      { key: 'admin', label: 'Admin', icon: '🔑', desc: 'Manage full setup, users, analytics and operations', page: 'admin-login' },
      { key: 'supervisor', label: 'Supervisor', icon: '🧭', desc: 'Oversee assigned building/floor operations and escalations', page: 'supervisor-login' },
      { key: 'electrician', label: 'Electrician', icon: '🛠️', desc: 'View assigned tickets, fix issues and upload proof photos', page: 'electrician-login' }
    ]}
  };

  var parts = location.pathname.split('/').filter(Boolean);
  var slug = parts[0]; var mod = parts[1];
  if (!slug || !mod) { location.href = '/'; return; }

  var meta = MODULE_META[mod];
  if (!meta) { location.href = '/' + slug; return; }

  // Auto-redirect if already logged in
  try {
    var savedSlug = localStorage.getItem('orgSlug');
    var savedMod  = localStorage.getItem('activeModule');
    if (savedSlug === slug && savedMod === mod) {
      var tk  = localStorage.getItem('token');
      var stk = localStorage.getItem('sup_token');
      var etk = localStorage.getItem('elec_token');
      if (tk) { location.href = '/' + slug + '/' + mod + '/admin-dashboard'; return; }
      if (stk) { location.href = '/' + slug + '/' + mod + '/supervisor-scan'; return; }
      if (etk) { location.href = '/' + slug + '/' + mod + '/electrician-tickets'; return; }
    }
  } catch(e) {}

  // Set dynamic manifest for this module
  var manifestLink = document.querySelector('link[rel="manifest"]');
  if (manifestLink) manifestLink.href = '/' + slug + '/' + mod + '/manifest.json';

  // Register module SW
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/' + slug + '/' + mod + '/sw.js', { scope: '/' + slug + '/' + mod + '/' }).catch(function(){});
  }

  fetch('/api/org/' + encodeURIComponent(slug)).then(function(r) {
    if (!r.ok) { document.getElementById('root').innerHTML = '<div class="mod-loading"><p style="color:var(--danger)">Organization not found</p></div>'; return null; }
    return r.json();
  }).then(function(org) {
    if (!org) return;
    var modules = org.enabledModules || ['ele'];
    if (modules.indexOf(mod) === -1) {
      document.getElementById('root').innerHTML = '<div class="mod-loading"><p style="color:var(--danger)">Module not available</p><a href="/' + slug + '" style="color:var(--primary);font-size:.85rem">Back</a></div>';
      return;
    }

    document.title = meta.label + ' — ' + org.name;
    var themeTag = document.querySelector('meta[name="theme-color"]');
    if (themeTag) themeTag.content = meta.color;

    var html = '<div style="font-size:2.5rem;margin-bottom:.5rem">' + meta.icon + '</div>' +
      '<div class="mod-title">' + meta.label + '</div>' +
      '<div class="mod-subtitle">Sign in to continue</div>' +
      '<div class="mod-org">' + esc(org.name) + ' · Powered by Kodspot</div>' +
      '<div class="role-grid">' +
      meta.roles.map(function(r) {
        return '<a href="/' + slug + '/' + mod + '/' + r.page + '" class="role-card" style="border-left:3px solid ' + meta.color + '">' +
          '<span class="role-icon">' + r.icon + '</span>' +
          '<div class="role-info"><div class="role-label">' + r.label + '</div><div class="role-desc">' + r.desc + '</div></div>' +
        '</a>';
      }).join('') +
      '</div>' +
      (modules.length > 1 ? '<div class="mod-back"><a href="/' + slug + '" style="color:var(--primary)">← All modules</a></div>' : '') +
      '<div class="mod-install-hint">💡 Tip: Use your browser\'s "Add to Home Screen" or "Install App" to install this as a standalone app on your device.</div>';

    document.getElementById('root').innerHTML = html;
  }).catch(function() {
    document.getElementById('root').innerHTML = '<div class="mod-loading"><p style="color:var(--danger)">Connection error</p></div>';
  });

  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
})();
</script>
</body>
</html>
