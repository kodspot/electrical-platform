name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.2.0

        env:
          NODE_ENV: production
          PORT: "3000"
          DOMAIN: kodspot.in

          APP_URL: ${{ secrets.APP_URL }}
          COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}

          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}

          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}

          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}

          SES_SMTP_HOST: ${{ secrets.SES_SMTP_HOST }}
          SES_SMTP_USER: ${{ secrets.SES_SMTP_USER }}
          SES_SMTP_PASS: ${{ secrets.SES_SMTP_PASS }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}

          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}

          ALERT_TELEGRAM_BOT_TOKEN: ${{ secrets.ALERT_TELEGRAM_BOT_TOKEN }}
          ALERT_TELEGRAM_CHAT_ID: ${{ secrets.ALERT_TELEGRAM_CHAT_ID }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}

          GLOBAL_AI_API_KEY: ${{ secrets.GLOBAL_AI_API_KEY }}
          GLOBAL_AI_PROVIDER: ${{ secrets.GLOBAL_AI_PROVIDER }}
          GLOBAL_AI_MODEL: ${{ secrets.GLOBAL_AI_MODEL }}

        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}

          timeout: 30m
          command_timeout: 30m

          envs: NODE_ENV,PORT,DOMAIN,APP_URL,COOKIE_DOMAIN,DATABASE_URL,DB_USER,DB_PASSWORD,DB_NAME,JWT_SECRET,COOKIE_SECRET,ADMIN_KEY,R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET_NAME,CORS_ORIGINS,SES_SMTP_HOST,SES_SMTP_USER,SES_SMTP_PASS,SES_FROM_EMAIL,DATA_ENCRYPTION_KEY,ALERT_TELEGRAM_BOT_TOKEN,ALERT_TELEGRAM_CHAT_ID,ALERT_WEBHOOK_URL,GLOBAL_AI_API_KEY,GLOBAL_AI_PROVIDER,GLOBAL_AI_MODEL

          script: |
            set -e

            cd ~/electrical-platform

            echo "=== PULLING LATEST CODE ==="
            git pull origin main

            echo "=== WRITING ENV FILE ==="

            cat > .env << EOF
            NODE_ENV=${NODE_ENV}
            PORT=${PORT}
            DOMAIN=${DOMAIN}
            APP_URL=${APP_URL}
            COOKIE_DOMAIN=${COOKIE_DOMAIN}
            DATABASE_URL=${DATABASE_URL}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            DB_NAME=${DB_NAME}
            JWT_SECRET=${JWT_SECRET}
            COOKIE_SECRET=${COOKIE_SECRET}
            ADMIN_KEY=${ADMIN_KEY}
            R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
            R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
            R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
            R2_BUCKET_NAME=${R2_BUCKET_NAME}
            CORS_ORIGINS=${CORS_ORIGINS}
            SES_SMTP_HOST=${SES_SMTP_HOST}
            SES_SMTP_USER=${SES_SMTP_USER}
            SES_SMTP_PASS=${SES_SMTP_PASS}
            SES_FROM_EMAIL=${SES_FROM_EMAIL}
            DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY}
            ALERT_TELEGRAM_BOT_TOKEN=${ALERT_TELEGRAM_BOT_TOKEN}
            ALERT_TELEGRAM_CHAT_ID=${ALERT_TELEGRAM_CHAT_ID}
            ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL}
            GLOBAL_AI_API_KEY=${GLOBAL_AI_API_KEY}
            GLOBAL_AI_PROVIDER=${GLOBAL_AI_PROVIDER}
            GLOBAL_AI_MODEL=${GLOBAL_AI_MODEL}
            EOF

            chmod 600 .env

            # Always clean up before deploy — prevents port conflicts from stale containers
            echo "=== STOPPING OLD CONTAINERS ==="
            docker compose down --remove-orphans

            echo "=== BUILDING NEW IMAGE ==="
            docker compose build

            echo "=== STARTING ALL SERVICES ==="
            docker compose up -d

            echo "=== WAITING FOR API TO BECOME HEALTHY ==="
            for i in $(seq 1 24); do
              if docker compose exec -T api wget -qO- http://127.0.0.1:3000/health > /dev/null 2>&1; then
                echo "✅ API is healthy (after ~${i}0s)"
                break
              fi
              echo "  Attempt $i/24 — not ready yet..."
              sleep 10
              if [ "$i" -eq 24 ]; then
                echo "❌ API HEALTH CHECK TIMED OUT after 240s"
                docker compose logs --tail 150 api
                exit 1
              fi
            done

            echo "✅ API HEALTHY"

            echo "=== CADDY STATUS ==="
            docker compose ps caddy

            echo "=== CADDY LOGS ==="
            docker compose logs --tail 50 caddy

            echo "=== CLEANUP UNUSED IMAGES ==="
            docker image prune -f

            echo "✅ DEPLOYMENT SUCCESSFUL"